# set downloaded status in db 
- route:
    from:
      uri: direct:downloadDone 
      steps:
        - setHeader:
            name: downloadId
            simple: ${body['id']}
        - setBody:
            constant: UPDATE transfer_postcon SET STATUS='DOWNLOADED' WHERE ID=:?downloadId
        - to:
            uri: jdbc:dataSource?useHeadersAsParameters=true
      