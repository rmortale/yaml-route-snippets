# poll db about new records
- route:
    from:
      uri: timer:poll-new-records
      parameters:
        period: 5000
      steps:
        - setBody:
            constant: SELECT * FROM transfer_postcon WHERE STATUS='NEW' ORDER BY event_time LIMIT 10
        - to:
            uri: jdbc:dataSource
        - split:
            simple: ${body}
            steps:
              - log: processing row here ${body}
              - to: direct:downloadDone

